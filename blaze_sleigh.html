<!DOCTYPE html>
<html>
<head>
<title>Blaze Sleigh 🔥</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}

#healthBar {
  width:200px;
  height:20px;
  background:red;
}

#health {
  height:100%;
  background:lime;
  width:100%;
}
</style>
</head>

<body>

<div id="ui">
Coins: <span id="coins"></span><br>
Score: <span id="score"></span><br>
High Score: <span id="highScore"></span>
<div id="healthBar"><div id="health"></div></div>
<div id="event">Event: None</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

/* SAVE */
let coins = Number(localStorage.getItem("coins")) || 67;
let highScore = Number(localStorage.getItem("highScore")) || 0;

/* SOUNDS */
const coinSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const hitSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

/* PLAYER */
let player = {
  x: canvas.width/2,
  y: canvas.height-100,
  vx: 0,
  health: 100,
  boost: 0,
  cooldown: 0
};

/* GAME */
let objs = [];
let ghosts = [];
let score = 0;
let currentEvent = "none";

/* CONTROLS */
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") player.vx = -7;
  if(e.key==="ArrowRight") player.vx = 7;

  if(e.code==="Space" && player.cooldown<=0){
    player.boost = 20;
    player.cooldown = 100;
  }
});

document.addEventListener("keyup", ()=> player.vx = 0);

/* MOBILE */
document.addEventListener("touchstart", e=>{
  let x = e.touches[0].clientX;
  if(x < window.innerWidth/2){
    player.vx = -7;
  } else {
    player.vx = 7;
  }
});
document.addEventListener("touchend", ()=> player.vx = 0);

/* SPAWN */
setInterval(()=>{
  let type = Math.random()<0.7?"snow":"tree";
  objs.push({x:Math.random()*canvas.width,y:-20,z:1,type});
},500);

setInterval(()=>{
  objs.push({
    x:Math.random()*canvas.width,
    y:-20,
    z:1,
    type: currentEvent==="easter"?"egg":"coin"
  });
},700);

/* LOOP */
function loop(){

  let gameSpeed = 5 + score/200;

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* SNOW PARTICLES */
  for(let i=0;i<40;i++){
    ctx.fillStyle="white";
    ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
  }

  player.x += player.vx;

  if(player.boost > 0){
    player.boost--;
    player.x += player.vx * 2;
  }

  if(player.cooldown > 0){
    player.cooldown--;
  }

  /* PLAYER */
  ctx.fillStyle="orange";
  ctx.fillRect(player.x, player.y, 25,25);

  objs.forEach((o,i)=>{
    o.y += gameSpeed;
    o.z += 0.02;

    let size = 10 * o.z;

    if(o.type==="tree") ctx.fillStyle="brown";
    else if(o.type==="snow") ctx.fillStyle="white";
    else if(o.type==="coin") ctx.fillStyle="gold";
    else if(o.type==="egg") ctx.fillStyle="pink";

    ctx.fillRect(o.x,o.y,size,size);

    if(player.x < o.x+size &&
       player.x+25 > o.x &&
       player.y < o.y+size &&
       player.y+25 > o.y){

      if(o.type==="tree"){ player.health=0; hitSound.play(); }
      if(o.type==="snow"){ player.health -= 2; hitSound.play(); }
      if(o.type==="coin"){ coins+=2; coinSound.play(); }
      if(o.type==="egg"){ coins+=5; coinSound.play(); }

      objs.splice(i,1);
    }
  });

  /* GHOSTS */
  ghosts.forEach(g=>{
    g.y += 4;
    ctx.fillStyle="purple";
    ctx.fillRect(g.x,g.y,20,20);

    if(player.x < g.x+20 && player.x+25>g.x && player.y<g.y+20 && player.y+25>g.y){
      player.health -= 1;
    }
  });

  /* FIRE DAMAGE */
  if(currentEvent==="fire"){
    player.health -= 0.1;
  }

  score++;

  /* HIGH SCORE */
  if(score > highScore){
    highScore = score;
    localStorage.setItem("highScore", highScore);
  }

  /* UI */
  document.getElementById("coins").innerText = coins;
  document.getElementById("score").innerText = score;
  document.getElementById("highScore").innerText = highScore;
  document.getElementById("health").style.width = player.health+"%";

  if(player.health<=0){
    alert("Game Over | Score: "+score);
    localStorage.setItem("coins", coins);
    location.reload();
  }

  requestAnimationFrame(loop);
}

/* EVENTS */
setTimeout(()=>{
  currentEvent="fire";
  document.getElementById("event").innerText="🔥 Fire Event";
  document.body.style.background="darkred";
},20000);

setTimeout(()=>{
  currentEvent="phantom";
  document.getElementById("event").innerText="👻 Phantom Event";
  setInterval(()=>{
    ghosts.push({x:Math.random()*canvas.width,y:-20});
  },800);
},30000);

setTimeout(()=>{
  currentEvent="easter";
  document.getElementById("event").innerText="🥚 Easter Event";
},40000);

setTimeout(()=>{
  currentEvent="christmas";
  document.getElementById("event").innerText="🎁 Christmas Event";
},50000);

loop();
</script>

</body>
</html>
